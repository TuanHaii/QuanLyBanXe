name: quan_ly_ban_xe
description: "Ứng dụng Quản Lý Bán Xe - Car Sales Management App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1

  # State Management
  provider: ^6.1.2
  flutter_bloc: ^8.1.6
  get_it: ^8.0.3

  # Navigation
  go_router: ^14.4.1

  # Network & API
  dio: ^5.7.0
  http: ^1.2.2
  connectivity_plus: ^6.0.5

  # Local Storage
  shared_preferences: ^2.3.3
  sqflite: ^2.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  intl: any
  logger: ^2.5.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  uuid: ^4.5.1

  # Form & Validation
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.0.0

  # Image Handling
  image_picker: ^1.1.2
  photo_view: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
